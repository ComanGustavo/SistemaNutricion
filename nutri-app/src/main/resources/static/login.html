<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - NutriSystem</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;

    background-image:url("img/img2.jpeg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    opacity:.45;
    z-index:-1;
}

.container{
    background:white;
    width:350px;
    padding:35px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.logo{
    width:160px;
    height:160px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid #28a745;
    padding:8px;
    margin-bottom:20px;
}

h2{
    color:#2c3e50;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:15px;
    box-sizing:border-box;
}

.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#28a745,#20c997);
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

.btn:hover{
    transform:scale(1.03);
}

.volver{
    margin-top:15px;
    display:block;
    color:#666;
    text-decoration:none;
}

.error{
    color:red;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

    <img src="img/img1.jpg" class="logo">

    <h2>Acceso Nutricionista</h2>

    <input type="text" id="usuario" placeholder="Usuario">

    <input type="password" id="password" placeholder="Contraseña">

    <p style="font-size:12px;color:#666;">
    Acceso exclusivo para la nutricionista.
    </p>

    <button class="btn" onclick="login()">
        Ingresar
    </button>

    <div id="error" class="error"></div>

    <a href="inicio.html" class="volver">
        ← Volver al inicio
    </a>

</div>

<script>

function login(){

    const usuario = document.getElementById("usuario").value;
    const password = document.getElementById("password").value;

    if(usuario === "Lbenitez" && password === "Mb050718"){

        sessionStorage.setItem("logueado","SI");

        window.location.href = "dashboard.html";

    }else{

        document.getElementById("error").innerText =
        "Usuario o contraseña incorrectos";

    }
}
</script>

</body>
</html>
