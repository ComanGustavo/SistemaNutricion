<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nutrición - Lic. Benitez</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;

    position: relative;

    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CAPA DE FONDO SUAVE */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background-image: url("img/img2.jpeg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    opacity: 0.45; /* 🔥 bajamos intensidad */
    z-index: -1;
}

    .container {
        background: white;
        padding: 40px;
        border-radius: 20px;
        text-align: center;
        width: 320px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        animation: aparecer 0.8s ease;
    }

    @keyframes aparecer {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

   .foto {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    object-fit: cover;
    border: 5px solid #28a745;
    margin-bottom: 15px;
    background: white;
    padding: 8px;
    animation: zoom 0.8s ease;
    }
    @keyframes zoom {
        from {
            transform: scale(0.7);
            opacity: 0;
        }
        to {
            transform: scale(1);
            opacity: 1;
        }
    }

    h1 {
        margin: 5px 0;
        color: #2c3e50;
    }

    h2 {
        margin: 0;
        font-size: 16px;
        color: #6c757d;
    }

    p {
        margin-top: 10px;
        color: #555;
    }

    .btn {
    margin-top: 25px;
    padding: 14px;
    width: 100%;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #28a745, #20c997);
    color: white;
    font-size: 17px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s;
}

    .btn:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
}
    .footer {
        margin-top: 15px;
        font-size: 12px;
        color: #999;
    }
</style>
</head>

<body>

<div class="container">

    <!-- FOTO -->
    <img src="img/img1.jpg" class="foto">

   

    <!-- DESCRIPCIÓN -->
    <p>Sistema de Gestión Nutricional</p>

    <!-- BOTÓN -->
    <button class="btn" onclick="ingresar()">
        Ingresar al sistema
    </button>

    <div class="footer">
        © Nutrición Profesional
    </div>

</div>

<script>
function ingresar() {
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
