<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Pacientes Adultos</title>

    <link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="sidebar-top">

            <div class="sidebar-logo">
                🥗 NutriSystem
            </div>

            <div class="sidebar-user">

                <div class="sidebar-avatar">
                    👩‍⚕️
                </div>

                <div class="sidebar-user-info">

                    <strong>
                        Lic. Benitez
                    </strong>

                    <span>
                        Nutricionista
                    </span>

                </div>

            </div>

        </div>

        <nav class="sidebar-menu">

            <a href="dashboard.html">
                📊 Dashboard
            </a>

            <a href="pacientes-adultos.html"
               class="active">
                👤 Pacientes Adultos
            </a>

            <a href="pacientes-pediatricos.html">
                👶 Pacientes Pediátricos
            </a>

            <a href="seguimiento.html">
                📈 Seguimiento
            </a>

            <a href="plan-alimentario.html">
                🍽️ Plan Alimentario
            </a>

            <a href="turnos.html">
                📅 Turnos
            </a>

            <a href="pagos.html">
                💳 Pagos
            </a>

        </nav>

    </aside>

    <!-- CONTENIDO -->
    <main class="main-content">

        <h1>
            Pacientes Adultos 👤
        </h1>

        <!-- FORMULARIO -->
        <div class="card">

             <!-- DATOS Personales -->

                 <h3 class="section-title">

                    <span class="section-line"></span>

                    Datos Personales

                </h3>
            <div class="form-grid">

                <div class="form-group">

                    <label>
                        Apellido y Nombre
                    </label>

                    <input id="nombre"
                           type="text">

                </div>

                <div class="form-group">

                    <label>
                        DNI
                    </label>

                    <input id="dni"
                           type="text">

                </div>

                <div class="form-group">

                    <label>
                        Edad
                    </label>

                    <input id="edad"
                           type="number">

                </div>

                <div class="form-group">

                    <label>
                        Teléfono
                    </label>

                    <input id="telefono"
                           type="text">

                </div>

                <div class="form-group">

                    <label>
                        Email
                    </label>

                    <input id="email"
                           type="email">

                </div>

            </div>

            <!-- DATOS CORPORALES -->
           <h3 class="section-title">

                <span class="section-line"></span>

                Datos Corporales

            </h3>

            <div class="form-grid">

                <div class="form-group">

                    <label>
                        Peso (kg)
                    </label>

                    <input type="number"
                           id="peso"
                           oninput="calcularIMC()">

                </div>

                <div class="form-group">

                    <label>
                        Altura (m)
                    </label>

                    <input type="number"
                           id="altura"
                           step="0.01"
                           oninput="calcularIMC()">

                </div>

                <div class="form-group">

                    <label>
                        IMC
                    </label>

                    <input type="text"
                           id="imc"
                           readonly>

                </div>

                <div class="form-group">

                    <label>
                        Grasa corporal
                    </label>

                    <input type="number"
                           id="grasaCorporal">

                </div>

                <div class="form-group">

                    <label>
                        Masa muscular
                    </label>

                    <input type="number"
                           id="masaMuscular">

                </div>

                <div class="form-group">

                    <label>
                        Grasa visceral
                    </label>

                    <input type="number"
                           id="grasaVisceral">

                </div>

            </div>

            <!-- ICC -->
            <h3 class="section-title">

            <span class="section-line"></span>

            Índice Cintura/Cadera

            </h3>
            <div class="form-grid">

                <div class="form-group">

                    <label>
                        Cintura
                    </label>

                    <input type="number"
                           id="cintura"
                           oninput="calcularICC()">

                </div>

                <div class="form-group">

                    <label>
                        Cadera
                    </label>

                    <input type="number"
                           id="cadera"
                           oninput="calcularICC()">

                </div>

                <div class="form-group">

                    <label>
                        ICC
                    </label>

                    <input type="text"
                           id="icc"
                           readonly>

                </div>

            </div>

            <!-- ENTREVISTA -->
            <h3 class="section-title">

                <span class="section-line"></span>

                Entrevista Nutricional

            </h3>

            <div class="form-group">

                <textarea id="entrevista"></textarea>

            </div>

            <!-- BOTÓN -->
            <button
                class="btn-primary"
                onclick="guardarPaciente()">

                💾 Guardar Paciente

            </button>

        </div>

        <!-- ARCHIVOS -->
        <div class="card">

            <h3 class="section-title">

                <span class="section-line"></span>

                Archivos del Paciente

            </h3>

            <input type="file"
                   id="archivoInput">

            <p id="pacienteInfo"
               style="color:green;"></p>

            <button
                class="btn-secondary"
                onclick="subirArchivoPaciente()">

                📤 Subir Archivo

            </button>

            <div id="listaArchivos"></div>

        </div>

        <!-- LISTA -->
        <div class="card">

            <h3 class="section-title">

                <span class="section-line"></span>

                Lista de Pacientes

            </h3>

            <ul id="lista"></ul>

        </div>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/api.js"></script>
<script src="script.js"></script>

</body>
</html>
